# --- General & Logging ---
CONFIG_HW_ID_LIBRARY=y
CONFIG_ASSERT=y
CONFIG_LOG=y

# --- Networking Core ---
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_NATIVE=y
CONFIG_NET_CONNECTION_MANAGER=y

# --- ZBus & Zephyr state framework ---
CONFIG_ZBUS=y
CONFIG_SMF=y

# --- Wi-Fi & DHCP ---
CONFIG_NET_DHCPV4=y
CONFIG_WIFI_CREDENTIALS=y
CONFIG_WIFI_CREDENTIALS_STATIC=y
CONFIG_WIFI_CREDENTIALS_STATIC_SSID="ja"
CONFIG_WIFI_CREDENTIALS_STATIC_PASSWORD="1234566789"

# Zwiększenie buforów sieciowych (wymagane przez Wi-Fi)
CONFIG_NET_PKT_RX_COUNT=10
CONFIG_NET_PKT_TX_COUNT=10

# --- MQTT ---
CONFIG_MQTT_HELPER=y
CONFIG_MQTT_CLEAN_SESSION=y
CONFIG_MQTT_HELPER_PORT=1883
